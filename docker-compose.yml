services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    command: >
      sh -c "printf '%s\n' 'server {'
        '  listen 80;'
        '  server_name _;'
        '  root /usr/share/nginx/html;'
        '  index index.html;'
        '  location / { try_files $$uri $$uri/ /index.html; }'
        '}' > /etc/nginx/conf.d/default.conf
        && nginx -g 'daemon off;'"
